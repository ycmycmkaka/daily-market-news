<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日環球財經及政治新聞總結</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f4f7f6; color: #333; }
        h1 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; margin-bottom: 30px; }
        .daily-news { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .daily-news h2 { color: #e74c3c; margin-top: 0; }
        ul { line-height: 1.6; }
        li { margin-bottom: 15px; }
        strong { color: #2980b9; }
        #loading { text-align: center; color: #7f8c8d; }
    </style>
</head>
<body>

    <h1>🌍 每日環球財經及政治新聞總結</h1>
    
    <div id="news-container">
        <p id="loading">正在加載最新新聞...</p>
    </div>

    <script>
        // 用 JavaScript 自動讀取 news_data.html 嘅內容
        fetch('news_data.html')
            .then(response => response.text())
            .then(data => {
                if(data.trim() !== "") {
                    document.getElementById('news-container').innerHTML = data;
                } else {
                    document.getElementById('news-container').innerHTML = "<p style='text-align:center;'>暫時未有新聞紀錄。</p>";
                }
            })
            .catch(error => {
                document.getElementById('news-container').innerHTML = "<p style='text-align:center;color:red;'>無法加載新聞，請稍後再試。</p>";
            });
    </script>

</body>
</html>
