name: Daily News Auto Update

on:
  schedule:
    # 每日 UTC 00:00 執行 (大約係香港時間朝早 8 點)
    - cron: '0 0,12 * * *'
  workflow_dispatch: # 容許你喺 GitHub 網頁手動撳掣執行

# 賦予寫入權限，等 Action 可以 commit 修改後嘅 index.html
permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python update_news.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add news_data.html
          # 如果有改動先 commit，無就 skip
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update daily news" && git push)
